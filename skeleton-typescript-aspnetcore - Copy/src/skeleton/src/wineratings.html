<template>
    <div class="panel panel-default">
        <div class="panel-heading">Wine Rating</div>
        <table class="table">
            <tr>
                <th>Wine Rating ID</th>
                <th>Visuality</th>
                <th>Nose</th>
                <th>Taste</th>
                <th>Judge Id</th>
                <th>Wine Id</th>
                <th></th>
            </tr>
            <tr repeat.for="wineRating of wineRatings">
                <td>${wineRating.wineRatingId}</td>
                <td>${wineRating.visuality}</td>
                <td>${wineRating.nose}</td>
                <td>${wineRating.taste}</td>
                <td>${wineRating.judgeId}</td> 
                <td>${wineRating.wineId}</td>               
                <td>
                    <a click.delegate="deleteWineRating(wineRating.wineRatingId)" class="btn btn-default btn-sm" aria-label="Left Align">
                        <span class="glyphicon glyphicon-trash" aria-hidden="true"></span>
                    </a>
                </td>
            </tr>
        </table>
        <hr />
        <table class="table">
            <tr>
                <th>Wine ID</th>
                <th>Visuality</th>
                <th>Nose</th>
                <th>Taste</th>
                <th>Number of Ratings</th>
                <th>Wine Level</th>
                <th>Overall Score</th>
            </tr>
            <tr repeat.for="wineRatingScore of wineRatingScores">
                <td>${wineRatingScore.wineId}</td>
                <td>${wineRatingScore.visuality}</td>
                <td>${wineRatingScore.nose}</td>
                <td>${wineRatingScore.taste}</td>
                <td>${wineRatingScore.numberOfRatings}</td>
                <td>${wineRatingScore.wineLevel}</td>
                <td>${wineRatingScore.overallScore}</td>
            </tr>
        </table>
        <hr />
        <form>
            <div class="form-group">
                <input type="text" value.bind="visuality" class="form-control" placeholder="Visuality">
            </div>
            <div class="form-group">
                <input type="text" value.bind="nose" class="form-control" placeholder="Nose">
            </div>
            <div class="form-group">
                <input type="text" value.bind="taste" class="form-control" placeholder="Taste">
            </div>
            <div class="form-group">
                <input type="text" value.bind="judgeId" class="form-control" placeholder="Judge Id">
            </div>
            <div class="form-group">
                <input type="text" value.bind="wineId" class="form-control" placeholder="WineId">
            </div>
            <button type="submit" click.delegate="addNewWineRating()" class="btn btn-default">Add New Wine Rating</button>
        </form>
    </div>
</template>
