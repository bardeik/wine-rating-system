<template>
    <div class="panel panel-default">
        <div class="panel-heading">Wine Rating</div>
        <table class="table">
            <tr>
                <th>Wine ID</th>
                <th>Rating Name</th>
                <th>Name</th>
                <th>Group</th>
                <th>Class</th>
                <th>Category</th>
                <th>Wine Producer Id</th>
                <th></th>
            </tr>
            <tr repeat.for="wine of wines">
                <td>${wine.wineId}</td>
                <td>${wine.ratingName}</td>
                <td>${wine.name}</td>
                <td>${wine.group}</td>
                <td>${wine.class}</td>
                <td>${wine.category}</td>
                <td>${wine.wineProducerId}</td>
                <td>
                    <a click.delegate="deleteWine(wine.wineId)" class="btn btn-default btn-sm" aria-label="Left Align">
                        <span class="glyphicon glyphicon-trash" aria-hidden="true"></span>
                    </a>
                </td>
            </tr>
        </table>
        <hr />
        <form>
            <div class="form-group">
                <input type="text" value.bind="ratingName" class="form-control" placeholder="Rating Name">
            </div>
            <div class="form-group">
                <input type="text" value.bind="name" class="form-control" placeholder="Name">
            </div>
            <div class="form-group">
                <input type="text" value.bind="group" class="form-control" placeholder="Group">
            </div>
            <div class="form-group">
                <input type="text" value.bind="class" class="form-control" placeholder="Class">
            </div>
            <div class="form-group">
                <input type="text" value.bind="category" class="form-control" placeholder="Category">
            </div>
            <div class="form-group">
                <input type="text" value.bind="wineProducerId" class="form-control" placeholder="Wine Producer Id">
            </div>
            <button type="submit" click.delegate="addNewWine()" class="btn btn-default">Add New Wine</button>
        </form>
    </div>
</template>
