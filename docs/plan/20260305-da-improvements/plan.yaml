  - id: "T009"
    title: "ISS-012 — Add CurrentUserStateTests.cs"
    agent: "gem-implementer"
    wave: 4
    status: "pending"
    issue: "ISS-012"
    files_to_create:
      - "WineApp/tests/WineApp.Tests/Services/CurrentUserStateTests.cs"
    files_to_modify: []
    dependencies:
      - "T008"
    description: >
      CurrentUserState has no unit tests.  Add CurrentUserStateTests.cs under
      WineApp/tests/WineApp.Tests/Services/ covering the key behaviours.

      Test class: CurrentUserStateTests
      SUT factory: creates a CurrentUserState with a mocked
        AuthenticationStateProvider.

      Required test cases:

        1. EnsureInitializedAsync_Unauthenticated_AllPropertiesDefault
           Mock returns ClaimsPrincipal.Empty.
           Assert: IsAuthenticated==false, UserId=="", IsAdmin==false,
                   IsJudge==false, IsWineProducer==false, IsViewer==false.

        2. EnsureInitializedAsync_AdminUser_IsAdminTrue
           Mock returns a ClaimsPrincipal with NameIdentifier "user-1",
           Name "admin@test.com", and role claim "Admin".
           Assert: IsAuthenticated==true, UserId=="user-1",
                   IsAdmin==true, IsJudge==false.

        3. EnsureInitializedAsync_Idempotent_DoesNotReloadOnSecondCall
           Mock setup with Verifiable; call EnsureInitializedAsync twice.
           Assert: GetAuthenticationStateAsync was called exactly once.

        4. ForceRefreshAsync_ResetsAndReloads
           Call EnsureInitializedAsync once (caches state), then change the
           mock to return a different ClaimsPrincipal, then call
           ForceRefreshAsync.
           Assert: properties reflect the new principal (proving re-read
           occurred), and GetAuthenticationStateAsync was called exactly twice.

      Use Mock<AuthenticationStateProvider> with
        .Setup(p => p.GetAuthenticationStateAsync())
        .ReturnsAsync(new AuthenticationState(principal)).

      GlobalUsings already covers xUnit, Moq, Shouldly, and the main project
      namespaces; add `using Microsoft.AspNetCore.Components.Authorization;`
      locally in the test file.
    acceptance_criteria:
      - "File WineApp/tests/WineApp.Tests/Services/CurrentUserStateTests.cs exists."
      - "All four test cases are present and named as specified."
      - "No MongoDB or Blazor component infrastructure is required to run the tests."
      - "`dotnet test` runs the new tests successfully (all pass)."

