  # ── WAVE 3 ── CurrentUserState refresh capability ──────────────────────────

  - id: "T008"
    title: "ISS-001 — Add ForceRefreshAsync() to CurrentUserState and call it after role changes"
    agent: "gem-implementer"
    wave: 3
    status: "pending"
    issue: "ISS-001"
    files_to_create: []
    files_to_modify:
      - "WineApp/src/WineApp/Services/CurrentUserState.cs"
      - "WineApp/src/WineApp/Pages/Judges.razor"
    dependencies: []
    description: >
      CurrentUserState uses a `_initialized` flag to avoid re-reading the auth
      state on every render.  This is correct for normal page navigation, but
      means that if an admin promotes or demotes a user on Judges.razor the
      calling circuit's CurrentUserState never picks up the change.

      Change 1 — CurrentUserState.cs:
        Add a public ForceRefreshAsync() method that resets _initialized and
        then calls the existing initialisation logic by awaiting
        EnsureInitializedAsync():

          /// <summary>
          /// Forces the state to re-read from the authentication provider on
          /// the next access — or immediately if called directly.
          /// Use after role changes affecting the current user.
          /// </summary>
          public async Task ForceRefreshAsync()
          {
              _initialized = false;
              await EnsureInitializedAsync();
          }

      Change 2 — Judges.razor:
        After the AddJudge or RemoveJudgeRole operations succeed, add a call
        to await CurrentUser.ForceRefreshAsync() so the current admin circuit
        reflects any self-role changes immediately.  Also inject CurrentUserState
        if it is not already injected on the page:
          @inject CurrentUserState CurrentUser

        In the AddJudge and RemoveJudgeRole handlers, after the UserManager call
        and the list reload, add:
          await CurrentUser.ForceRefreshAsync();
    acceptance_criteria:
      - "CurrentUserState has a public async Task ForceRefreshAsync() method."
      - "ForceRefreshAsync resets _initialized to false before calling EnsureInitializedAsync."
      - "Judges.razor injects CurrentUserState."
      - "Judges.razor calls CurrentUser.ForceRefreshAsync() after every successful AddJudge and RemoveJudgeRole operation."
      - "dotnet build succeeds with zero errors."

