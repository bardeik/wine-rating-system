tasks:
  # ── WAVE 1 ── Pure logic fixes with no inter-task dependencies ─────────────

  - id: "T001"
    title: "ISS-007 — ClassificationService.GetThreshold: throw on unknown classification"
    agent: "gem-implementer"
    wave: 1
    status: "pending"
    issue: "ISS-007"
    files_to_create: []
    files_to_modify:
      - "WineApp/src/WineApp/Services/ClassificationService.cs"
    dependencies: []
    description: >
      The default arm of the switch expression in ClassificationService.GetThreshold
      currently returns 0, which silently causes every wine to be classified as
      Acceptable regardless of its score when an unrecognised classification string
      is passed.  Replace the silent default with an ArgumentOutOfRangeException so
      callers cannot pass invalid values without immediate feedback.

      Change in ClassificationService.cs, method GetThreshold:
        BEFORE:  _ => 0
        AFTER:   _ => throw new ArgumentOutOfRangeException(nameof(classification),
                          classification, "Unknown classification value.")
    acceptance_criteria:
      - "GetThreshold no longer has a `_ => 0` arm in the switch expression."
      - "Passing an unknown classification string throws ArgumentOutOfRangeException."
      - "All four known constants (Gold, Silver, Bronze, SpecialMerit) still resolve correctly."
      - "Existing ClassificationServiceTests still pass."

  - id: "T002"
    title: "ISS-008 — Remove DateTime.UtcNow defaults from WineRating.RatingDate and Event.CreatedDate"
    agent: "gem-implementer"
    wave: 1
    status: "pending"
    issue: "ISS-008"
    files_to_create: []
    files_to_modify:
      - "WineApp/src/WineApp/Models/WineRating.cs"
      - "WineApp/src/WineApp/Models/Event.cs"
      - "WineApp/src/WineApp/Pages/JudgeRating.razor"
      - "WineApp/src/WineApp/Pages/Events.razor"
      - "WineApp/src/WineApp/Data/DatabaseSeeder.cs"
    dependencies: []
    description: >
      WineRating.RatingDate and Event.CreatedDate both carry `= DateTime.UtcNow`
      as property initialisers, which bypasses the TimeProvider abstraction and
      makes those timestamps untestable.

      Step 1 – Models: Remove the default initialisers so the properties default
      to `DateTime.MinValue` (the CLR default for DateTime), making it obvious
      when a caller has forgotten to supply the timestamp.

        WineRating.cs:
          BEFORE:  public DateTime RatingDate { get; set; } = DateTime.UtcNow;
          AFTER:   public DateTime RatingDate { get; set; }

        Event.cs:
          BEFORE:  public DateTime CreatedDate { get; set; } = DateTime.UtcNow;
          AFTER:   public DateTime CreatedDate { get; set; }

      Step 2 – Call sites: ensure every place that creates a WineRating or Event
      instance explicitly sets the timestamp.  Audit the following files and add
      the missing assignments using the TimeProvider already injected into each
      service/page:

        • JudgeRating.razor: the SaveRating / auto-save methods construct a
          WineRating object.  Set `RatingDate = _timeProvider.GetUtcNow().UtcDateTime`
          (inject TimeProvider via @inject TimeProvider TimeProvider if not already
          present).
        • Events.razor: the SaveEvent / CreateEvent handler constructs an Event.
          Set `CreatedDate = TimeProvider.GetUtcNow().UtcDateTime`.
        • DatabaseSeeder.cs: the seed data already uses explicit `RatingDate =
          DateTime.UtcNow` — this is acceptable in seeder code only (no production
          clock injection required).  Leave these unchanged to avoid disrupting the
          seeder, but add a comment noting the intentional exception.

      Step 3 – Verify no other production code (i.e., outside DatabaseSeeder.cs)
      instantiates WineRating or Event without supplying a timestamp.
    acceptance_criteria:
      - "WineRating.RatingDate has no default initialiser in the model."
      - "Event.CreatedDate has no default initialiser in the model."
      - "JudgeRating.razor sets RatingDate via TimeProvider, not DateTime.UtcNow."
      - "Events.razor sets CreatedDate via TimeProvider, not DateTime.UtcNow."
      - "DatabaseSeeder.cs call sites retain DateTime.UtcNow with a clarifying comment."
      - "No production file outside DatabaseSeeder.cs uses DateTime.UtcNow to set these fields."
      - "dotnet build succeeds with zero errors."

  - id: "T003"
    title: "ISS-009 — OutlierDetectionService.CalculateVariance: use sample variance (N-1)"
    agent: "gem-implementer"
    wave: 1
    status: "pending"
    issue: "ISS-009"
    files_to_create: []
    files_to_modify:
      - "WineApp/src/WineApp/Services/OutlierDetectionService.cs"
      - "WineApp/tests/WineApp.Tests/Services/OutlierDetectionServiceTests.cs"
    dependencies: []
    description: >
      CalculateVariance divides by `values.Count` (population variance, N),
      which systematically underestimates spread for small judge panels.
      The service also has no guard for a single-element list, which would
      produce a mathematically undefined sample variance.

      Changes to OutlierDetectionService.cs, private method CalculateVariance:
        • Add guard: if values.Count < 2, return 0m.
        • Change divisor from `values.Count` to `values.Count - 1`.

        BEFORE:
          private decimal CalculateVariance(List<decimal> values)
          {
              if (!values.Any())
                  return 0;
              var avg = values.Average();
              var sumOfSquares = values.Sum(v => (v - avg) * (v - avg));
              return sumOfSquares / values.Count;
          }

        AFTER:
          private decimal CalculateVariance(List<decimal> values)
          {
              if (values.Count < 2)
                  return 0;
              var avg = values.Average();
              var sumOfSquares = values.Sum(v => (v - avg) * (v - avg));
              return sumOfSquares / (values.Count - 1);
          }

      Also update OutlierDetectionServiceTests.cs to add/update tests that
      verify the N-1 calculation and the single-element guard.
    acceptance_criteria:
      - "CalculateVariance uses `values.Count - 1` as the divisor."
      - "CalculateVariance returns 0 when the input list has fewer than 2 elements."
      - "Unit tests assert the corrected variance value for a known input (e.g., [10, 12, 14] → variance 4.0 not 2.67)."
      - "Unit tests assert single-element input returns 0."
      - "All existing OutlierDetectionServiceTests still pass."

  - id: "T004"
    title: "ISS-011 — TrophyService: return null winner when RequiresLottery is true; update TrophyReports.razor"
    agent: "gem-implementer"
    wave: 1
    status: "pending"
    issue: "ISS-011"
    files_to_create: []
    files_to_modify:
      - "WineApp/src/WineApp/Services/TrophyService.cs"
      - "WineApp/src/WineApp/Pages/TrophyReports.razor"
      - "WineApp/tests/WineApp.Tests/Services/TrophyServiceTests.cs"
    dependencies: []
    description: >
      GetAaretsVinbondeAsync currently calls `.First()` even when
      `RequiresLottery == true`, returning an arbitrary winner that the UI
      then presents as definitive.  This misleads admins into thinking the
      title has been awarded when it actually requires an offline lottery.

      Changes to TrophyService.cs, method GetAaretsVinbondeAsync:

        After the `RequiresLottery` flag is set and the WineResult records are
        persisted, return `(null, finalCandidates.First().result)` so the
        caller receives a non-null result (carrying the lottery flag and
        highest-single-score info) but a null wine, signalling that no single
        winner can be presented yet.

        BEFORE (inside the `finalCandidates.Count > 1` branch):
          return (finalCandidates.First().wine, finalCandidates.First().result);

        AFTER:
          // Cannot declare a single winner — lottery required.
          // Return the first result (carrying RequiresLottery=true) with a null
          // wine so callers can render the lottery-required state.
          return (null, finalCandidates.First().result);

      Changes to TrophyReports.razor, Årets Vinbonde card:

        The existing template already renders a lottery warning block when
        `aaretsVinbonde.result.RequiresLottery` is true, but only inside the
        winner-detail section guarded by `wine != null`.  Add a new dedicated
        branch:

          @if (aaretsVinbonde.wine == null && aaretsVinbonde.result != null
               && aaretsVinbonde.result.RequiresLottery)
          {
              <div class="text-center text-warning py-4">
                  <div class="display-1 mb-2">🎲</div>
                  <h5 class="text-warning">Loddtrekning påkrevd</h5>
                  <p class="mb-1">Høyeste enkeltscore: @aaretsVinbonde.result.HighestSingleScore.ToString("F1")</p>
                  <small class="text-muted">Gjennomfør loddtrekning for å kåre Årets Vinbonde.</small>
              </div>
          }
          else if (aaretsVinbonde.wine != null && aaretsVinbonde.result != null)
          {
              ... existing winner detail markup ...
          }
          else
          {
              ... existing "no winner found" markup ...
          }

      Add/update TrophyServiceTests.cs to cover the new lottery-return case.
    acceptance_criteria:
      - "GetAaretsVinbondeAsync returns (null, result) — not (wine, result) — when the result has RequiresLottery=true."
      - "TrophyReports.razor renders a 'Loddtrekning påkrevd' block when wine is null and result.RequiresLottery is true."
      - "The existing winner-detail block is unchanged and still renders when wine is non-null."
      - "Unit test asserts that the returned tuple has wine==null and result.RequiresLottery==true when a full tie exists."
      - "Existing TrophyServiceTests still pass."

