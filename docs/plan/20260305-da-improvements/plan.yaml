            public Task<List<Payment>> GetPaymentsByProducerIdAsync(string producerId)
                => _paymentRepository.GetPaymentsByProducerIdAsync(producerId);

            public Task<List<Payment>> GetPaymentsByEventIdAsync(string eventId)
